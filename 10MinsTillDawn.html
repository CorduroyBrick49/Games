      <script>
	  function resizeUnityContainer() {
      var container = document.getElementById("gameContainer");
      if (container) {
        container.style.width = window.innerWidth + "px";
        container.style.height = window.innerHeight + "px";
      }
    }

    window.addEventListener('resize', resizeUnityContainer);
	  function UnityProgress(gameInstance, progress) {
      try {
        if (progress === 'complete') {
          return;
        }
        var pct = 0;
        if (typeof progress === 'number') pct = progress;
        else if (progress && progress.total && progress.loaded) pct = progress.loaded / progress.total;
        var txt = document.getElementById('loading-text');
        if (txt) txt.textContent = 'Loading... ' + Math.round(pct * 100) + '%';
      } catch (e) {
        console.error('Progress error:', e);

function blobToDataUrl(blob) {
    return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onloadend = () => resolve(reader.result);  
        reader.readAsDataURL(blob);
    });
}

async function unzipWebpFromUrl(dataUri) {
    const blobUrls = {};
	var realdatauri = await blobToDataUrl(dataUri)
   
    const base64 = realdatauri.split(',')[1];
    const binaryString = atob(base64);
    const len = binaryString.length;
    const bytes = new Uint8Array(len);
    for (let i = 0; i < len; i++) {
        bytes[i] = binaryString.charCodeAt(i);
    }

   
    const zip = await JSZip.loadAsync(bytes);


    for (const [filename, file] of Object.entries(zip.files)) {
    if (!file.dir) {
        let mime = '';

        if (filename.endsWith('.js') || filename.endsWith('.mjs')) {
            mime = 'text/javascript';
        } else if (filename.endsWith('.css')) {
            mime = 'text/css';
        } else if (filename.endsWith('.html')) {
            mime = 'text/html';
        } else if (filename.endsWith('.webp')) {
            mime = 'image/webp';
        } else if (filename.endsWith('.png')) {
            mime = 'image/png';
        } else if (filename.endsWith('.jpg') || filename.endsWith('.jpeg')) {
            mime = 'image/jpeg';
        }
      

        const rawBlob = await file.async("blob");
        const blob = mime ? new Blob([rawBlob], { type: mime }) : rawBlob;

        const blobUrl = URL.createObjectURL(blob);
        console.log(filename);
        blobUrls[filename] = blobUrl;
    }
}


    return blobUrls;
}


const BASE91_TABLE =
"ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789" +
"!#$%&()*+,./:;<=>?@[]^_`{|}~\"";

 
const BASE91_DECODE = {};
for (let i = 0; i < BASE91_TABLE.length; i++) {
    BASE91_DECODE[BASE91_TABLE[i]] = i;
}

function base91DecodeToBlobURL(base91String, mime = "application/octet-stream") {
    let v = -1, b = 0, n = 0;
    let out = [];

    for (let i = 0; i < base91String.length; i++) {
        let c = BASE91_DECODE[base91String[i]];
        if (c === undefined) continue;

        if (v < 0) v = c;
        else {
            v += c * 91;
            b |= v << n;
            n += (v & 8191) > 88 ? 13 : 14;

            while (n >= 8) {
                out.push(b & 255);
                b >>= 8;
                n -= 8;
            }
            v = -1;
        }
    }

    if (v >= 0)
        out.push((b | (v << n)) & 255);

     
    const blob = new Blob([new Uint8Array(out)], { type: mime });
    return blob;
